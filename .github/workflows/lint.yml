name: Linter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Run Linters and Vet
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: --timeout 10m0s
          working-directory: .

      - name: Go vet
        run: go vet ./...
        working-directory: .
